<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinanzKompass v1.6.4</title>
    <style>
        :root {
            --bg-color: #080c10;
            --card-bg: rgba(22, 34, 47, 0.7);
            --card-solid: #131f2b;
            --text-color: #f5f6f9;
            --text-muted: #7f8e9c;
            --accent-blue: #38b6ff;
            --accent-green: #00f076;
            --accent-red: #ff4a5a;
            --accent-orange: #ff9f1a;
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 110px;
            padding-top: env(safe-area-inset-top);
            background-image: radial-gradient(circle at top right, rgba(56, 182, 255, 0.08), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(0, 240, 118, 0.05), transparent 400px);
            background-attachment: fixed;
        }

        header {
            padding: 24px 20px 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            padding: 0 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .main-card {
            background: linear-gradient(145deg, rgba(28, 45, 62, 0.9), rgba(16, 26, 37, 0.9));
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(56, 182, 255, 0.15);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        .main-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .main-card .amount {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 4px;
            background: linear-gradient(110deg, #fff, #b0c4de);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mini-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-sm);
        }

        .mini-card .title {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mini-card .val {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .val.green { color: var(--accent-green); }
        .val.red { color: var(--accent-red); }
        .val.orange { color: var(--accent-orange); }
        .val.blue { color: var(--accent-blue); }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 24px 0 12px 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .list-row {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s;
        }

        .list-row:active { transform: scale(0.98); }

        .item-info .name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .item-info .sub { font-size: 12px; color: var(--text-muted); }
        .item-amount { font-weight: 700; font-size: 16px; letter-spacing: -0.2px; }

        .nav-wrapper {
            position: fixed;
            bottom: 24px; left: 16px; right: 16px;
            z-index: 999; display: flex; justify-content: center;
        }

        .tabs {
            background: rgba(19, 31, 43, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 6px; display: flex; width: 100%; max-width: 450px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tab-btn {
            flex: 1; background: none; border: none; color: var(--text-muted);
            padding: 12px 8px; font-size: 13px; font-weight: 700; border-radius: 18px;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background: var(--accent-blue); color: #080c10; box-shadow: 0 4px 12px rgba(56, 182, 255, 0.3);
        }

        .budget-row { margin-bottom: 16px; }
        .budget-row:last-child { margin-bottom: 0; }
        
        .progress-bar {
            background-color: rgba(255,255,255,0.05); height: 10px; border-radius: 5px; overflow: hidden; margin-top: 6px;
        }
        .progress-fill { height: 100%; border-radius: 5px; width: 0%; transition: width 0.5s ease-out; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(4, 6, 9, 0.8); z-index: 1000; justify-content: center; align-items: flex-end;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #111a24; width: 100%; max-width: 550px;
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            padding: 24px 24px calc(24px + env(safe-area-inset-bottom)) 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px;
        }
        .form-control {
            width: 100%; background-color: rgba(255,255,255,0.04); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; color: white; font-size: 16px;
        }
        .form-control:focus { outline: none; border-color: var(--accent-blue); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--accent-blue), #0084ff); color: #080c10; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; margin-top: 12px; box-shadow: 0 6px 20px rgba(56, 182, 255, 0.25);
        }
        .btn-close { background: none; border: none; color: var(--text-muted); float: right; font-size: 18px; cursor: pointer; }

        .fab {
            position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--accent-blue), #0084ff); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 32px; color: #080c10;
            box-shadow: 0 8px 25px rgba(56, 182, 255, 0.4); cursor: pointer; z-index: 99;
        }

        .fav-chip {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 40px; font-size: 13px; color: var(--accent-blue); font-weight: 600;
        }

        .chart-box { position: relative; margin: 20px 0; }
        .donut-chart { width: 160px; height: 160px; border-radius: 50%; position: relative; }
        .donut-hole {
            width: 104px; height: 104px; background-color: #0f1822; position: absolute; top: 28px; left: 28px; border-radius: 50%;
        }

        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 700; letter-spacing: 0.3px;
